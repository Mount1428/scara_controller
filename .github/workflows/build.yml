name: Build & Release

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  release:
    types: [published]

env:
  BUILD_TYPE: Release
  GCC_VERSION: "14.2"
  GCC_RELEASE: "14.2.rel1"

jobs:
  build:
    name: Build Firmware
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Install build tools
        run: sudo apt-get update && sudo apt-get install -y cmake ninja-build xz-utils

      - name: Cache ARM toolchain
        uses: actions/cache@v4
        id: cache-toolchain
        with:
          path: ${{ runner.temp }}/arm-gnu-toolchain
          key: arm-gnu-toolchain-${{ env.GCC_RELEASE }}

      - name: Download ARM GNU Toolchain
        if: steps.cache-toolchain.outputs.cache-hit != 'true'
        run: |
          mkdir -p ${{ runner.temp }}/arm-gnu-toolchain
          curl -L "https://developer.arm.com/-/media/Files/downloads/gnu/${{ env.GCC_RELEASE }}/binrel/arm-gnu-toolchain-${{ env.GCC_RELEASE }}-x86_64-arm-none-eabi.tar.xz" \
            | tar -xJ --strip-components=1 -C ${{ runner.temp }}/arm-gnu-toolchain

      - name: Add toolchain to PATH
        run: echo "${{ runner.temp }}/arm-gnu-toolchain/bin" >> $GITHUB_PATH

      - name: Show toolchain version
        run: arm-none-eabi-gcc --version

      - name: Configure CMake
        run: cmake --preset ${{ env.BUILD_TYPE }}

      - name: Build
        run: cmake --build build/${{ env.BUILD_TYPE }}

      - name: Generate binary artifacts
        run: |
          arm-none-eabi-objcopy -O ihex build/${{ env.BUILD_TYPE }}/scara_controller.elf scara_controller.hex
          arm-none-eabi-objcopy -O binary build/${{ env.BUILD_TYPE }}/scara_controller.elf scara_controller.bin
          arm-none-eabi-size build/${{ env.BUILD_TYPE }}/scara_controller.elf | tee size-report.txt

      - name: Generate build summary
        run: |
          echo "## Build Results" >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          cat size-report.txt >> $GITHUB_STEP_SUMMARY
          echo '```' >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Format | File |" >> $GITHUB_STEP_SUMMARY
          echo "|--------|------|" >> $GITHUB_STEP_SUMMARY
          echo "| ELF | scara_controller.elf |" >> $GITHUB_STEP_SUMMARY
          echo "| HEX | scara_controller.hex |" >> $GITHUB_STEP_SUMMARY
          echo "| BIN | scara_controller.bin |" >> $GITHUB_STEP_SUMMARY

      - name: Upload build artifacts
        uses: actions/upload-artifact@v5
        with:
          name: scara-controller-firmware
          path: |
            scara_controller.elf
            scara_controller.hex
            scara_controller.bin
            size-report.txt
          retention-days: 30

  release:
    name: Publish Release
    needs: build
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v5
        with:
          name: scara-controller-firmware

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            scara_controller.elf
            scara_controller.hex
            scara_controller.bin
            size-report.txt
